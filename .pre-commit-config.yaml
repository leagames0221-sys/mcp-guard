# Pre-commit hooks for mcp-guard
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Channel B forbidden token mask (T-05 wired, scans staged diff against
  # gitignored .claude/internal_notes.md mask list, fails closed if missing)
  - repo: local
    hooks:
      - id: forbidden-token-mask
        name: Channel B forbidden token mask
        entry: pnpm mask:check
        language: system
        pass_filenames: false
        always_run: true
