version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    # 7-day cooldown — defer update PRs until the action version has been
    # published for at least 7 days. GitHub native feature GA 2025-07-01.
    # Matches the .npmrc-side minimum-release-age gate.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5

