name: mcp-schema-drift

# Detects drift between the locally pinned MCP specification commit and
# upstream HEAD per ADR-0005 + D-008. Runs on pull_request (so a stale
# pin blocks merge per D-008), on push to main (so the badge stays
# honest), and weekly so a stale pin surfaces within a reasonable
# window even without a code change.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/scanners/mcp-schema/**'
      - 'scripts/update-mcp-schema.ts'
      - '.github/workflows/mcp-schema-drift.yml'
  push:
    branches: [main]
    paths:
      - 'src/scanners/mcp-schema/**'
      - 'scripts/update-mcp-schema.ts'
      - '.github/workflows/mcp-schema-drift.yml'
  schedule:
    # Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  drift-check:
    name: MCP spec pin drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 20 LTS, matches the stack lock in ADR-0003 §1.
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # version sourced from package.json "packageManager" field
          # (pnpm/action-setup@v4 errors on multi-source mismatch).
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run drift check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec tsx scripts/update-mcp-schema.ts --check

      - name: Upload drift report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-schema-drift-report
          path: mcp-schema-drift-report.json
          if-no-files-found: ignore
