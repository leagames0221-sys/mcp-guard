name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # GitHub Advanced Security is required for dependency-review on PRIVATE repos
    # (paid add-on). Skipped while repo is PRIVATE to keep within free tier.
    # When the repo is flipped to PUBLIC (post Phase α verify), this job activates.
    if: ${{ github.event.repository.visibility == 'public' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.1, LGPL-3.0
          comment-summary-in-pr: always
